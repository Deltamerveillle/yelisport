openapi: 3.1.0
info:
  title: YeliSport API
  version: 0.1.0
  description: Contrat initial de l'API YeliSport.
servers:
  - url: /api/v1
paths:
  /health:
    get:
      operationId: getHealth
      summary: API liveness
      tags: [health]
      security: []
      responses:
        "200":
          description: Service is running.
          headers:
            X-Request-ID:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required: [status, service, version, environment, timestamp]
      properties:
        status:
          type: string
          const: ok
        service:
          type: string
        version:
          type: string
        environment:
          type: string
        timestamp:
          type: string
          format: date-time
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []
