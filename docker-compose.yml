name: yelisport

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-yelisport}
      POSTGRES_USER: ${POSTGRES_USER:-yelisport}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [backend]

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api/Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-yelisport}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-yelisport}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}
    ports:
      - "8000:8000"
    volumes:
      - ./services/api:/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [backend, edge]

  ai:
    build:
      context: .
      dockerfile: infrastructure/docker/ai/Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
    ports:
      - "8001:8001"
    volumes:
      - ./services/ai:/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/ai/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [backend]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      ai:
        condition: service_healthy
    networks: [edge, backend]

volumes:
  postgres_data:

networks:
  edge:
  backend:
    internal: true
